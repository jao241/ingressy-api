services:
  app:
    build: .
    container_name: ingressy_api
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: ingressy_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:15
    container_name: ingressy_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: '$5adcoe0##-4axc'
      POSTGRES_DB: ingressy
    ports:
      - "5432:5432"
